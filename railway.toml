# Railway config-as-code: https://docs.railway.com/reference/config-as-code
# Build produces `dist/` so the same Node process can serve the SPA + `/api/*`.

[build]
# Clean install avoids EBUSY on `rmdir node_modules/.vite` in Docker/Railpack; Vite cache outside node_modules.
buildCommand = "rm -rf node_modules && npm ci && VITE_CACHE_DIR=/tmp/vite-cache npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
