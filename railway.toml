# Railway config-as-code: https://docs.railway.com/reference/config-as-code
# Build produces `dist/` so the same Node process can serve the SPA + `/api/*`.

[build]
# Use root Dockerfile so the image never reuses a Railpack-mounted `node_modules` (fixes busy `.vite`).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Match Dockerfile CMD; avoids npm as PID 1. Image ENV still sets ZAREWA_LISTEN_HOST for Railway probes.
startCommand = "node server/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
